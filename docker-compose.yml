services:
  llama-cpp-router-monitor:
    build: .
    container_name: llama-cpp-router-monitor
    ports:
      - "9090:9090"
      - "9091:9091"
    environment:
      - MONITOR_LISTEN_ADDR=:9090
      - BACKEND_URLS=${BACKEND_URLS:-http://host.docker.internal:8080}
      - LISTEN_ADDRS=${LISTEN_ADDRS:-:9091}
      - ALLOW_DYNAMIC_BACKEND=${ALLOW_DYNAMIC_BACKEND:-true}
      - RETENTION_DAYS=${RETENTION_DAYS:-14}
      - MAX_REQUEST_BYTES=${MAX_REQUEST_BYTES:-33554432}
      - MAX_CAPTURE_BYTES=${MAX_CAPTURE_BYTES:-33554432}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-600}
      - POLL_BACKEND_METRICS=${POLL_BACKEND_METRICS:-true}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-10}
      - DATA_DIR=/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
